<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HnSlides</title>

<style>
body { margin:0; font-family: Arial; background:#0b0b0b; color:white; }

/* LOGIN */
#authBox {
 background:#111;
 text-align:center;
 padding:20px;
}
#authBox input {
 padding:8px;
 margin:5px;
 border-radius:5px;
 border:none;
}

/* HEADER */
header { padding:15px; background:#111; text-align:center; }
header h1 { color:#ff3b3b; }

.topbar { background:#ff3b3b; text-align:center; padding:5px; font-size:12px; }

/* HERO */
.hero {
 position: relative;
 text-align:center;
 padding:90px 20px;
 overflow:hidden;
}

.bg-animado {
 position:absolute;
 width:200%;
 height:200%;
 background:
 radial-gradient(circle at 20% 30%, #ff3b3b33, transparent 40%),
 radial-gradient(circle at 80% 70%, #ff000022, transparent 40%);
 animation: moverFundo 12s infinite alternate;
}

@keyframes moverFundo {
 from { transform: translate(0,0); }
 to { transform: translate(-40px,20px); }
}

.hero span { color:#ff3b3b; }

.botao {
 background:#ff3b3b;
 border:none;
 padding:10px;
 border-radius:8px;
 color:white;
 cursor:pointer;
}

/* GRID */
.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:20px; }
.card { background:#1a1a1a; border-radius:15px; padding:10px; }

.slider img {
 width:100%;
 height:160px;
 object-fit:cover;
 border-radius:10px;
}

.preco { color:#ff3b3b; }

/* WHATS */
.whatsapp {
 position:fixed;
 bottom:20px;
 right:20px;
 background:#25D366;
 width:60px;
 height:60px;
 border-radius:50%;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:24px;
 cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox">
<h2>🔐 Entrar ou Criar Conta</h2>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button class="botao" onclick="registrar()">Criar Conta</button>
<button class="botao" onclick="login()">Entrar</button>
<p id="status"></p>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<div class="topbar">Compre direto pelo WhatsApp ⚡</div>

<header><h1>HnSlides</h1></header>

<section class="hero">
<div class="bg-animado"></div>

<h2>Slides que <span>transformam</span></h2>

<p>Apresentações criativas e animadas para escola</p>

<p>📲 @HndsX</p>

<button class="botao" onclick="scrollProdutos()">Explorar</button>
</section>

<div class="grid" id="produtos">

<div class="card">
<img src="imagens/slide1.png">
<h3>Slide Bob Esponja</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="comprar('Bob Esponja')">Comprar</button>
</div>

<div class="card">
<img src="imagens/ShrekSlide.png">
<h3>Slide Shrek</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="comprar('Shrek')">Comprar</button>
</div>

<div class="card">
<img src="imagens/CharlieBrown1.png">
<h3>Slide Charlie Brown</h3>
<p class="preco">R$ 8,00</p>
<button class="botao" onclick="comprar('Charlie Brown')">Comprar</button>
</div>

</div>

</div>

<div class="whatsapp" onclick="abrirWhats()">💬</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// CONFIG FIREBASE
const firebaseConfig = {
 apiKey: "SUA_API_KEY",
 authDomain: "SEU_DOMINIO.firebaseapp.com",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN
function registrar(){
 let email=email.value;
 let senha=senha.value;
 auth.createUserWithEmailAndPassword(email, senha)
 .then(()=>status.innerText="Conta criada!")
 .catch(e=>status.innerText=e.message);
}

function login(){
 let email=email.value;
 let senha=senha.value;
 auth.signInWithEmailAndPassword(email, senha)
 .then(()=>status.innerText="Logado!")
 .catch(e=>status.innerText=e.message);
}

// LIBERAR SITE
auth.onAuthStateChanged(user=>{
 if(user){
  authBox.style.display="none";
  site.style.display="block";
 } else {
  authBox.style.display="block";
  site.style.display="none";
 }
});

// FUNÇÕES
function scrollProdutos(){
 document.getElementById('produtos').scrollIntoView({behavior:'smooth'});
}

function comprar(nome){
 let msg = `Olá, quero comprar o slide ${nome}`;
 window.open(`https://wa.me/5599999999999?text=${encodeURIComponent(msg)}`);
}

function abrirWhats(){
 window.open("https://wa.me/5599999999999");
}

</script>

</body>
</html>
