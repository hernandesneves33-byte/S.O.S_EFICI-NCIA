<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriSlides</title><style>
body { margin:0; font-family: Arial; background:#0b0b0b; color:white; }
header { display:flex; justify-content:space-between; padding:15px; background:#111; }
header h1 { color:#ff3b3b; }

.banner {
  padding:30px;
  background:linear-gradient(90deg,#000,#300000);
}

.banner h2 { font-size:28px; }
.banner span { color:#ff3b3b; }

.produtos {
  display:flex;
  overflow-x:auto;
  gap:15px;
  padding:20px;
}

.card {
  min-width:250px;
  background:#1a1a1a;
  border-radius:15px;
  padding:10px;
  transition:0.3s;
}

.card:hover { transform:scale(1.05); }

.card img { width:100%; border-radius:10px; }

.card h3 { font-size:16px; }

.preco { color:#ff3b3b; font-weight:bold; }

.botao {
  background:#ff3b3b;
  color:white;
  border:none;
  padding:8px;
  border-radius:8px;
  width:100%;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.carrinho {
  background:#111;
  padding:20px;
  margin:20px;
  border-radius:15px;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
}

</style></head><body><header>
<h1>PriSlides</h1>
<p>Templates</p>
</header><div class="banner">
<h2>Os queridinhos da <span>galera</span></h2>
<p>Slides que estão bombando 🔥</p>
</div><div class="produtos"><div class="card">
<img src="https://via.placeholder.com/250x140?text=Slide+Gemini">
<h3>Slide Gemini</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="add('Gemini',9.9)">Comprar</button>
</div><div class="card">
<img src="https://via.placeholder.com/250x140?text=Slide+Criativo">
<h3>Slide Criativo</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="add('Criativo',9.9)">Comprar</button>
</div><div class="card">
<img src="https://via.placeholder.com/250x140?text=Slide+Anime">
<h3>Slide Anime</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="add('Anime',9.9)">Comprar</button>
</div></div><h2 style="padding-left:20px;">Templates Premium</h2><div class="grid"><div class="card">
<img src="https://via.placeholder.com/300x160?text=Bob+Esponja">
<h3>Slide Bob Esponja</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="add('Bob Esponja',9.9)">Comprar</button>
</div><div class="card">
<img src="https://via.placeholder.com/300x160?text=Coraline">
<h3>Slide Coraline</h3>
<p class="preco">R$ 9,90</p>
<button class="botao" onclick="add('Coraline',9.9)">Comprar</button>
</div></div><div class="carrinho">
<h2>Carrinho</h2>
<ul id="lista"></ul>
<p>Total: R$ <span id="total">0</span></p>
<button class="botao" onclick="whatsapp()">Finalizar Compra</button>
</div><a class="whatsapp" onclick="whatsapp()">💬</a>

<script>
let carrinho = [];

function add(nome, preco){
 carrinho.push({nome,preco});
 atualizar();
}

function atualizar(){
 let lista = document.getElementById('lista');
 let total = 0;
 lista.innerHTML='';

 carrinho.forEach(item=>{
  let li=document.createElement('li');
  li.textContent=item.nome+' - R$ '+item.preco;
  lista.appendChild(li);
  total+=item.preco;
 });

 document.getElementById('total').textContent=total.toFixed(2);
}

function whatsapp(){
 if(carrinho.length==0){alert('Carrinho vazio'); return;}
 let msg='Quero comprar:%0A';
 carrinho.forEach(i=>{ msg+='- '+i.nome+'%0A'; });
 window.open('https://wa.me/5599999999999?text='+msg);
}
</script></body>
</html>
