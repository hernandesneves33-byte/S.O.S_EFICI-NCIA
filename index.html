<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>S.O.S Eficiência</title>

<style>
:root {
  --bg:#0d0b1a;
  --bg2:#13102b;
  --text:#f0eeff;
  --purple:#6f6bd8;
}

/* 🔥 CORREÇÃO GLOBAL */
html, body {
  height:100%;
  width:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:sans-serif;

  overflow:hidden;
  touch-action: pan-y;
  overscroll-behavior: none;

  position: fixed; /* 🔥 trava o body */
}

/* APP */
#app {
  height:100vh;
  display:flex;
  flex-direction:column;
  max-width:480px;
  margin:0 auto;
}

/* TOP */
.topbar {
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:var(--bg2);
}

/* BOTÃO */
.sos-btn {
  background:#e85d8a;
  border:none;
  color:white;
  padding:8px 14px;
  border-radius:20px;
}

/* PAGES */
.pages {
  flex:1;
  position:relative;
}

.page {
  position:absolute;
  inset:0;

  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling: touch;

  padding:20px;

  opacity:0;
  pointer-events:none;

  overscroll-behavior: contain; /* 🔥 trava dentro */
}

.page.active {
  opacity:1;
  pointer-events:auto;
}

/* NAV */
.bottom-nav {
  height:70px;
  display:flex;
  background:var(--bg2);
}

.nav-btn {
  flex:1;
  border:none;
  background:none;
  color:#888;
}

.nav-btn.active {
  color:#fff;
}

/* CARDS */
.card {
  background:#1a1635;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}
</style>
</head>

<body>

<div id="app">

  <div class="topbar">
    <span>💜 S.O.S Eficiência</span>
    <button class="sos-btn">SOS</button>
  </div>

  <div class="pages">

    <div class="page active" id="home">
      <div class="card">Tela inicial</div>
      <div style="height:1200px"></div>
    </div>

    <div class="page" id="diary">
      <div class="card">Diário</div>
      <div style="height:1200px"></div>
    </div>

    <div class="page" id="exercises">
      <div class="card">Exercícios</div>
      <div style="height:1200px"></div>
    </div>

    <div class="page" id="library">
      <div class="card">Biblioteca</div>
      <div style="height:1200px"></div>
    </div>

    <div class="page" id="profile">
      <div class="card">Perfil</div>
      <div style="height:1200px"></div>
    </div>

  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="nav('home', this)">🏠</button>
    <button class="nav-btn" onclick="nav('diary', this)">📖</button>
    <button class="nav-btn" onclick="nav('exercises', this)">🌬️</button>
    <button class="nav-btn" onclick="nav('library', this)">📚</button>
    <button class="nav-btn" onclick="nav('profile', this)">👤</button>
  </div>

</div>

<script>

/* NAVEGAÇÃO */
function nav(page, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  document.getElementById(page).classList.add('active');
  el.classList.add('active');
}

/* 🔥 BLOQUEIO TOTAL DO PULL-TO-REFRESH */
let startY = 0;

document.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, { passive:false });

document.addEventListener('touchmove', e => {
  const currentY = e.touches[0].clientY;
  const activePage = document.querySelector('.page.active');

  if (!activePage) return;

  const isAtTop = activePage.scrollTop === 0;

  if (isAtTop && currentY > startY) {
    e.preventDefault(); // 🔥 bloqueia refresh
  }
}, { passive:false });

</script>

</body>
</html>
